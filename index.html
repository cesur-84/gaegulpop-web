<!DOCTYPE html>
<html lang="en-us">
  <head>
<script>/* [game alert suppressed] */
(function(){
  try {
    var h = (window.location.hash||'').replace(/^#/,'');
    if (window.opener && h.indexOf('access_token=')>=0) {
      var a='', r='';
      h.split('&').forEach(function(kv){ var p=kv.split('=');
        if(p[0]==='access_token') a=decodeURIComponent(p[1]||'');
        if(p[0]==='refresh_token') r=decodeURIComponent(p[1]||''); });
      if(a){ try{ localStorage.setItem('ggp_access',a); localStorage.setItem('ggp_refresh',r); }catch(e){} }
      try{ window.opener.postMessage({ggpAuth:true},'*'); }catch(e){}
      try{ window.stop(); }catch(e){}
      try{ document.title='로그인 완료'; document.write('<body style="background:#0c1a0c;color:#cdeccb;font-family:sans-serif;text-align:center;padding-top:40vh">로그인 완료! 이 창은 자동으로 닫혀요.</body>'); document.close(); }catch(e){}
      setTimeout(function(){ try{ window.close(); }catch(e){} }, 300);
      return;
    }
  } catch(e){}
  var _alert = window.alert;
  window.alert = function(m){ try{ console.warn('[suppressed alert]', m); }catch(e){} };
  window.addEventListener('unhandledrejection', function(e){ try{ console.warn('[suppressed rejection]', e.reason); }catch(_){} e.preventDefault(); });
  window.addEventListener('error', function(e){ try{ if(e && e.message && /call stack/i.test(e.message)){ console.warn('[suppressed error]', e.message); e.preventDefault(); return false; } }catch(_){} });
})();
</script>

    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Gaegulpop</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Gaegulpop</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/130653e63580bfe39a0c541b59c1588e.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/bcf4aa658552843467639dc1e48fbe69.data.unityweb",
        frameworkUrl: buildUrl + "/746abddde2c84515f1678542bed8e1cd.framework.js.unityweb",
        codeUrl: buildUrl + "/977c45441e25cb9e823aebf7fd5d7794.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Gaegulpop",
        productVersion: "0.6.2",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };

              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
